<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySprint AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="logo">📚</div>

        <h1>StudySprint AI</h1>

        <p class="subtitle">
            AI-powered personalized study planner
        </p>

        <input
            id="exam"
            type="text"
            placeholder="Enter Exam Name">

        <input
            id="hours"
            type="number"
            placeholder="Study Hours Per Day">

<h3>Subject 1</h3>

<div class="subject-box">

    <label for="subject1">Subject Name</label>
    <input
        id="subject1"
        type="text"
        placeholder="e.g. DSA">

    <label for="date1">Exam Date</label>
    <input
        id="date1"
        type="date">

    <label for="priority1">Priority</label>
    <select id="priority1">
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
    </select>

    <label for="prep1">Current Preparation Level</label>
    <select id="prep1">
        <option>Poor</option>
        <option>Average</option>
        <option>Good</option>
    </select>

</div>
<h3>Subject 2</h3>

<div class="subject-box">

    <label for="subject2">Subject Name</label>
    <input
        id="subject2"
        type="text"
        placeholder="e.g. DSA">

    <label for="date2">Exam Date</label>
    <input
        id="date2"
        type="date">

    <label for="priority2">Priority</label>
    <select id="priority2">
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
    </select>

    <label for="prep2">Current Preparation Level</label>
    <select id="prep2">
        <option>Poor</option>
        <option>Average</option>
        <option>Good</option>
    </select>

</div>
<h3>Subject 3</h3>

<div class="subject-box">

    <label for="subject3">Subject Name</label>
    <input
        id="subject3"
        type="text"
        placeholder="e.g. DSA">

    <label for="date3">Exam Date</label>
    <input
        id="date3"
        type="date">

    <label for="priority3">Priority</label>
    <select id="priority3">
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
    </select>

    <label for="prep3">Current Preparation Level</label>
    <select id="prep3">
        <option>Poor</option>
        <option>Average</option>
        <option>Good</option>
    </select>

</div>

        <button onclick="generatePlan()">
            Generate Study Plan
        </button>

        <div id="result"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
